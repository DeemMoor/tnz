# nginx отдаёт статику и проксирует PHP в контейнер php-fpm.
# docroot = backend/public (это и есть будущий public_html на BeGet).
server {
    listen 80;
    server_name localhost;
    root /app/backend/public;

    location / {
        try_files $uri /index.php$is_args$args;
    }

    # Все PHP-запросы идут на единственную точку входа Symfony — public/index.php.
    location ~ ^/index\.php(/|$) {
        fastcgi_pass php:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        internal;
    }

    # Прямой доступ к любым другим .php запрещаем (безопасность).
    location ~ \.php$ {
        return 404;
    }

    client_max_body_size 20m;  # как лимит upload на BeGet
}
