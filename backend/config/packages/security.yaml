security:
    # Хеширование паролей: argon2id ('auto' выберет лучший доступный).
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # Провайдер пользователей по телефону с нормализацией формата ввода.
    providers:
        app_user_provider:
            id: App\Security\PhoneUserProvider

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            provider: app_user_provider

            # Вход по JSON: POST /api/login  { "phone": "...", "password": "..." }.
            # Сессионная авторизация (cookie PHPSESSID) — SPA и API на одном домене.
            json_login:
                check_path: api_login
                username_path: phone
                password_path: password

            logout:
                path: api_logout

    # Порядок важен: применяется первое совпавшее правило.
    access_control:
        - { path: ^/api/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/register, roles: PUBLIC_ACCESS }
        - { path: ^/api/ping, roles: PUBLIC_ACCESS }
        - { path: ^/api/verify-email, roles: PUBLIC_ACCESS }
        - { path: ^/api/forgot-password, roles: PUBLIC_ACCESS }
        - { path: ^/api/reset-password, roles: PUBLIC_ACCESS }
        - { path: ^/api/admin, roles: ROLE_ADMIN }
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/api/me, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
